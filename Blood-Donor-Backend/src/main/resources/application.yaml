spring:
  application:
    name: blood-donor
  datasource:
    url: jdbc:mysql://localhost:3306/blood_donor_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:change-this-to-a-256-bit-secret-key-in-production}
  expiration-ms: 86400000

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
    default-search-radius-km: 25

spring.mail:
  host: ${MAIL_HOST:smtp.gmail.com}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true

blood-donor:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from-name: ${MAIL_FROM_NAME:Blood Donors}
    low-stock-threshold: 5
    expiry-warning-days: 7
