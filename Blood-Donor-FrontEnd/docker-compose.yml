services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blood-donor-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_BASE_URL: http://localhost:8080/api
