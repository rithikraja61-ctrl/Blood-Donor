services:
  mysql:
    image: mysql:8.0
    container_name: blood-donor-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blood_donor_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: ./Blood-Donor-Backend
      dockerfile: Dockerfile
    container_name: blood-donor-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_USERNAME: root
      DB_PASSWORD: root
      JWT_SECRET: change-this-to-a-256-bit-secret-key-in-production-docker
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: